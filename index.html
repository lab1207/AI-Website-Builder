    <meta charset="UTF-8" />

    <title>Lovable Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              lovable: {
                dark: '#131314',      /* Main Background */
                panel: '#1E1F20',     /* Surface/Sidebar */
                border: '#444746',    /* Borders */
                hover: '#28292a',     /* Hover state */
                accent: '#0b57d0',    /* Google Blue */
                accentHover: '#0842a0',
                text: '#E3E3E3',      /* Primary Text */
                textDim: '#C4C7C5'    /* Secondary Text */
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        background-color: #131314;
        color: #E3E3E3;
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #131314; 
      }
      ::-webkit-scrollbar-thumb {
        background: #444746; 
        border-radius: 5px;
        border: 2px solid #131314;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #5E5E5E; 
      }
    </style>
